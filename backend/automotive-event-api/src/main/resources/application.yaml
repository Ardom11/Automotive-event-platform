spring:
  application:
    name: automotive-event-api
  profiles:
    active: dev
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  security:
    jwt:
      secret: ${SECRET_KEY}
      expiration: 3600000
  flyway:
    enabled: true

---
spring:
  config:
    activate:
      on-profile: dev
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true

---
spring:
  config:
    activate:
      on-profile: prod
  jpa:
    show-sql: false
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false